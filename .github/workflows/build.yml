name: Build Obsidian Plugin
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build plugin
        run: npm run build
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json
      - name: Upload compiled plugin
        uses: actions/upload-artifact@v4
        with:
          name: lastfm-plugin
          path: |
            main.js
            manifest.json
            styles.css
